{% extends 'base.html' %}
{% block title %}{{ 'Edit vendor' if vendor else 'New vendor' }}{% endblock %}
{% block content %}
<div class="page-header">
  <div>
    <h1 class="page-title">{{ 'Edit vendor' if vendor else 'New vendor' }}</h1>
  </div>
</div>

<div class="card" style="max-width:720px">
  <div class="card-body">
    <form method="post" class="form-stack wide">
      <label class="field">
        <span class="field-label">Name<span class="req">*</span></span>
        <input type="text" id="name" name="name" required value="{{ vendor['name'] if vendor else '' }}">
      </label>
      <div class="form-grid" style="grid-template-columns:repeat(2, 1fr)">
        <label class="field">
          <span class="field-label">Contact person</span>
          <input type="text" id="contact_person" name="contact_person" value="{{ vendor['contact_person'] if vendor else '' }}">
        </label>
        <label class="field">
          <span class="field-label">Phone</span>
          <input type="text" id="phone" name="phone" value="{{ vendor['phone'] if vendor else '' }}">
        </label>
        <label class="field">
          <span class="field-label">Email</span>
          <input type="text" id="email" name="email" value="{{ vendor['email'] if vendor else '' }}">
        </label>
      </div>
      <label class="field">
        <span class="field-label">Address</span>
        <textarea id="address" name="address" rows="2">{{ vendor['address'] if vendor else '' }}</textarea>
      </label>
      <div class="actions-row" style="margin-top:4px">
        <button type="submit" class="btn btn-primary">Save</button>
        <a class="btn btn-ghost" href="{{ url_for('catalog.vendors') }}">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
