{% extends 'base.html' %}
{% block title %}Settings{% endblock %}
{% block content %}
<div class="page-header">
  <div>
    <h1 class="page-title">Settings</h1>
    <p class="page-sub">Logged in as <strong>{{ g.user['email'] }}</strong></p>
  </div>
</div>

<div class="card" style="max-width:480px">
  <div class="card-header"><h2 class="card-title">Change password</h2></div>
  <div class="card-body">
    <form method="post" class="form-stack wide">
      <label class="field">
        <span class="field-label">Current password</span>
        <input type="password" id="current_password" name="current_password" required>
      </label>
      <label class="field">
        <span class="field-label">New password</span>
        <input type="password" id="new_password" name="new_password" required>
        <span class="hint">Minimum 8 characters</span>
      </label>
      <label class="field">
        <span class="field-label">Confirm new password</span>
        <input type="password" id="confirm_password" name="confirm_password" required>
      </label>
      <div class="actions-row" style="margin-top:4px">
        <button type="submit" class="btn btn-primary">Update password</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
